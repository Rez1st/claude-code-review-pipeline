# Local development only — mimics Azure Service Bus using RabbitMQ
# In Azure, swap for Azure Service Bus (see infra/modules/messaging.bicep)

version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: claude-review-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
