name: Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-claude-review-poc
  AZURE_LOCATION: westeurope
  REGISTRY: acrclaudereviewdev.azurecr.io

jobs:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  infra:
    name: Deploy infrastructure (Bicep)
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.deploy.outputs.apiUrl }}
      frontend_url: ${{ steps.deploy.outputs.frontendUrl }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            infra/parameters.dev.json
            anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }}

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    name: Build & deploy ASP.NET Core API
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & publish API
        run: |
          dotnet publish src/Api/Api.csproj -c Release -o ./publish/api

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-claude-review-dev
          package: ./publish/api

  # ── Worker ───────────────────────────────────────────────────────────────────
  worker:
    name: Build & push Worker image
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrclaudereviewdev

      - name: Build & push Worker Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/claude-review-worker:latest \
            -f src/Worker/Dockerfile src/Worker
          docker push ${{ env.REGISTRY }}/claude-review-worker:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name ca-worker-claude-review-dev \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/claude-review-worker:latest

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Build & deploy React frontend
    runs-on: ubuntu-latest
    needs: [infra, api]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: src/Frontend
        env:
          VITE_API_URL: ${{ needs.infra.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/Frontend
          output_location: dist
